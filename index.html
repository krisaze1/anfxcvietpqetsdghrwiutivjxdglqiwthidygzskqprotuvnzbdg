<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Stats</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Unbounded:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --border: #1e1e2e;
    --accent: #00ff88;
    --accent2: #ff4466;
    --accent3: #ffaa00;
    --text: #e0e0f0;
    --muted: #555570;
    --positive: #00ff88;
    --negative: #ff4466;
    --header-bg: #0d0d1a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    overflow-x: hidden;
    min-height: 100vh;
  }

  /* TOP BAR */
  .topbar {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--header-bg);
    border-bottom: 1px solid var(--border);
    padding: 10px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    backdrop-filter: blur(10px);
  }

  .topbar-title {
    font-family: 'Unbounded', sans-serif;
    font-size: 13px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 0.05em;
  }

  .topbar-date {
    font-size: 10px;
    color: var(--muted);
  }

  .refresh-btn {
    background: none;
    border: 1px solid var(--accent);
    color: var(--accent);
    padding: 4px 10px;
    border-radius: 4px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .refresh-btn:active { background: var(--accent); color: var(--bg); }

  /* TOTALS STRIP */
  .totals-strip {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 1px;
    background: var(--border);
    border-bottom: 2px solid var(--accent);
  }

  .total-card {
    background: var(--surface);
    padding: 8px 6px;
    text-align: center;
  }

  .total-label {
    font-size: 9px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 3px;
  }

  .total-value {
    font-size: 13px;
    font-weight: 700;
    color: var(--accent);
  }

  .total-value.rev { color: var(--accent3); }
  .total-value.roi-pos { color: var(--positive); }
  .total-value.roi-neg { color: var(--negative); }

  /* TABLE WRAPPER */
  .table-wrapper {
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    min-width: 600px;
  }

  thead th {
    position: sticky;
    top: 0;
    background: var(--header-bg);
    color: var(--muted);
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    padding: 8px 8px;
    text-align: right;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
    z-index: 10;
  }

  thead th:first-child {
    text-align: left;
    position: sticky;
    left: 0;
    z-index: 20;
    background: var(--header-bg);
    min-width: 100px;
    max-width: 130px;
  }

  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
    animation: fadeIn 0.3s ease both;
  }

  tbody tr:hover, tbody tr:active { background: #111120; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  td {
    padding: 9px 8px;
    text-align: right;
    font-size: 11px;
    white-space: nowrap;
    color: var(--text);
  }

  td:first-child {
    text-align: left;
    position: sticky;
    left: 0;
    background: var(--bg);
    z-index: 5;
    font-size: 10px;
    color: #aaaacc;
    max-width: 130px;
    overflow: hidden;
    text-overflow: ellipsis;
    border-right: 1px solid var(--border);
  }

  tr:hover td:first-child, tr:active td:first-child { background: #111120; }

  .roi-pos { color: var(--positive); font-weight: 600; }
  .roi-neg { color: var(--negative); font-weight: 600; }
  .spend-val { color: #ffffff; font-weight: 600; }
  .dep-val { color: var(--accent3); font-weight: 600; }
  .rev-val { color: var(--accent3); }

  /* ROW INDEX */
  .row-num {
    color: var(--muted);
    font-size: 9px;
    padding-right: 4px;
    user-select: none;
  }

  /* LOADING */
  .loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 20px;
    gap: 16px;
  }

  .spinner {
    width: 32px;
    height: 32px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-text {
    color: var(--muted);
    font-size: 11px;
    letter-spacing: 0.1em;
  }

  /* ERROR */
  .error-box {
    margin: 20px 14px;
    padding: 14px;
    border: 1px solid var(--accent2);
    border-radius: 6px;
    background: #1a0a0e;
    color: var(--accent2);
    font-size: 11px;
    line-height: 1.6;
  }

  /* SORT INDICATOR */
  th.sorted { color: var(--accent); }
  th.sorted::after { content: ' ↓'; }
  th.sorted.asc::after { content: ' ↑'; }

  /* LAST UPDATED */
  .footer {
    padding: 10px 14px;
    text-align: center;
    color: var(--muted);
    font-size: 9px;
    letter-spacing: 0.05em;
    border-top: 1px solid var(--border);
    margin-top: 8px;
  }

  /* EMPTY */
  .empty {
    padding: 40px;
    text-align: center;
    color: var(--muted);
    font-size: 11px;
  }

  /* Scrollbar styling */
  ::-webkit-scrollbar { height: 3px; width: 3px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--muted); }
</style>
</head>
<body>

<div class="topbar">
  <div>
    <div class="topbar-title">📊 STATS</div>
    <div class="topbar-date" id="dateRange">загрузка...</div>
  </div>
  <button class="refresh-btn" onclick="loadData()">↺ обновить</button>
</div>

<div id="totalsStrip" class="totals-strip" style="display:none">
  <div class="total-card">
    <div class="total-label">Spend</div>
    <div class="total-value" id="t-spend">—</div>
  </div>
  <div class="total-card">
    <div class="total-label">Lids</div>
    <div class="total-value" id="t-lids">—</div>
  </div>
  <div class="total-card">
    <div class="total-label">Dep</div>
    <div class="total-value dep" id="t-dep">—</div>
  </div>
  <div class="total-card">
    <div class="total-label">Rev</div>
    <div class="total-value rev" id="t-rev">—</div>
  </div>
  <div class="total-card">
    <div class="total-label">ROI</div>
    <div class="total-value" id="t-roi">—</div>
  </div>
</div>

<div id="main"></div>

<div class="footer" id="footer"></div>

<script>
const DATA_URL = 'data.json';
let allData = [];
let sortCol = 'Spend';
let sortAsc = false;

async function loadData() {
  const main = document.getElementById('main');
  main.innerHTML = `<div class="loading"><div class="spinner"></div><div class="loading-text">ЗАГРУЗКА ДАННЫХ...</div></div>`;
  document.getElementById('totalsStrip').style.display = 'none';

  try {
    const res = await fetch(DATA_URL + '?t=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const json = await res.json();

    allData = json.data || [];
    const meta = json.meta || {};

    document.getElementById('dateRange').textContent = meta.date_from && meta.date_to
      ? `${meta.date_from} → ${meta.date_to}`
      : 'нет данных';

    document.getElementById('footer').textContent =
      meta.updated_at ? `обновлено: ${meta.updated_at}` : '';

    renderTotals(json.totals || {});
    renderTable(allData);

  } catch(e) {
    main.innerHTML = `<div class="error-box">
      ⚠ Не удалось загрузить данные<br><br>
      <span style="color:var(--muted)">${e.message}</span><br><br>
      Убедись что скрипт запускался и файл data.json существует.
    </div>`;
  }
}

function renderTotals(t) {
  if (!t.Spend && !t.Revenue) return;
  document.getElementById('totalsStrip').style.display = 'grid';
  document.getElementById('t-spend').textContent = fmt(t.Spend) || '—';
  document.getElementById('t-lids').textContent = t.Lids || '—';
  document.getElementById('t-dep').textContent = t.Dep || '—';
  document.getElementById('t-rev').textContent = fmt(t.Revenue) || '—';

  const roiEl = document.getElementById('t-roi');
  const roi = parseFloat(t.ROI) || 0;
  roiEl.textContent = t.ROI || '—';
  roiEl.className = 'total-value ' + (roi >= 0 ? 'roi-pos' : 'roi-neg');
}

function fmt(n) {
  if (n === undefined || n === null) return '—';
  return Number(n).toLocaleString('ru-RU');
}

function renderTable(data) {
  const main = document.getElementById('main');

  if (!data || data.length === 0) {
    main.innerHTML = '<div class="empty">нет данных за выбранный период</div>';
    return;
  }

  // Sort
  const sorted = [...data].sort((a, b) => {
    let av = a[sortCol], bv = b[sortCol];
    av = isNaN(av) ? String(av) : Number(av);
    bv = isNaN(bv) ? String(bv) : Number(bv);
    if (av < bv) return sortAsc ? -1 : 1;
    if (av > bv) return sortAsc ? 1 : -1;
    return 0;
  });

  const cols = [
    { key: 'Creative', label: 'Creative' },
    { key: 'Spend',    label: 'Spend' },
    { key: 'Clicks',   label: 'Clk' },
    { key: 'Avg CPC',  label: 'CPC' },
    { key: 'Lids',     label: 'Lid' },
    { key: 'CPL',      label: 'CPL' },
    { key: 'Reg',      label: 'Reg' },
    { key: 'Dep',      label: 'Dep' },
    { key: 'Revenue',  label: 'Rev' },
    { key: 'ROI',      label: 'ROI' },
  ];

  let html = `<div class="table-wrapper"><table><thead><tr>`;
  cols.forEach(c => {
    const isSorted = sortCol === c.key;
    const cls = isSorted ? (sortAsc ? 'sorted asc' : 'sorted') : '';
    html += `<th class="${cls}" onclick="setSort('${c.key}')">${c.label}</th>`;
  });
  html += `</tr></thead><tbody>`;

  sorted.forEach((row, i) => {
    const roi = parseFloat(row['ROI']) || 0;
    const roiCls = roi >= 0 ? 'roi-pos' : 'roi-neg';
    html += `<tr style="animation-delay:${i * 0.02}s">
      <td title="${row['Creative']}">${row['Creative']}</td>
      <td class="spend-val">${fmt(row['Spend'])}</td>
      <td>${row['Clicks'] || '—'}</td>
      <td>${row['Avg CPC'] || '—'}</td>
      <td>${row['Lids'] || '—'}</td>
      <td>${row['CPL'] || '—'}</td>
      <td>${row['Reg'] || '—'}</td>
      <td class="dep-val">${row['Dep'] || '—'}</td>
      <td class="rev-val">${fmt(row['Revenue'])}</td>
      <td class="${roiCls}">${row['ROI'] || '—'}</td>
    </tr>`;
  });

  html += `</tbody></table></div>`;
  main.innerHTML = html;
}

function setSort(col) {
  if (sortCol === col) sortAsc = !sortAsc;
  else { sortCol = col; sortAsc = false; }
  renderTable(allData);
}

// Init
loadData();

// Telegram Mini App integration
if (window.Telegram && window.Telegram.WebApp) {
  window.Telegram.WebApp.ready();
  window.Telegram.WebApp.expand();
}
</script>
</body>
</html>
