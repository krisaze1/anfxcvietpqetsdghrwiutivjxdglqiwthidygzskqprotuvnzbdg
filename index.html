<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Stats Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    /* Основная палитра: глубокие и чистые темные тона */
    --bg: #09090b;
    --surface: #121214;
    --surface-hover: #18181b;
    --border: #27272a;
    
    /* Текст */
    --text-main: #f4f4f5;
    --text-muted: #a1a1aa;
    
    /* Акценты (сдержанные, не "кричащие") */
    --accent: #ffffff;
    --positive: #10b981; /* Изумрудный */
    --negative: #ef4444; /* Коралловый */
    --brand: #3b82f6;    /* Спокойный синий */
    
    /* Фоны для строк */
    --row-positive: rgba(16, 185, 129, 0.04);
    --row-negative: rgba(239, 68, 68, 0.04);
    --row-positive-hover: rgba(16, 185, 129, 0.08);
    --row-negative-hover: rgba(239, 68, 68, 0.08);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text-main);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: 12px;
    overflow-x: hidden;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* ТОПБАР */
  .topbar {
    position: sticky; top: 0; z-index: 100;
    background: rgba(9, 9, 11, 0.85);
    border-bottom: 1px solid var(--border);
    padding: 12px 16px;
    display: flex; align-items: center; justify-content: space-between;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
  }

  .topbar-left { display: flex; flex-direction: column; gap: 4px; }

  .topbar-title {
    font-size: 14px; font-weight: 600;
    color: var(--text-main); letter-spacing: 0.02em;
    display: flex; align-items: center; gap: 8px;
  }

  .topbar-date { font-size: 11px; color: var(--text-muted); font-weight: 500;}

  .live-badge {
    display: flex; align-items: center; gap: 4px;
    background: rgba(16, 185, 129, 0.1); 
    color: var(--positive);
    font-size: 9px; padding: 2px 6px; border-radius: 4px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.05em;
  }
  
  .live-badge::before {
    content: ''; width: 6px; height: 6px; border-radius: 50%;
    background: var(--positive);
    animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
  }

  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

  .topbar-right { display: flex; align-items: center; gap: 12px; }
  .updated-time { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-muted); }

  .share-btn {
    background: var(--surface); border: 1px solid var(--border); color: var(--text-main);
    padding: 6px 12px; border-radius: 6px;
    font-family: 'Inter', sans-serif; font-size: 11px; font-weight: 500;
    cursor: pointer; transition: all 0.2s ease; white-space: nowrap;
    display: flex; align-items: center; gap: 6px;
  }
  .share-btn:hover { background: var(--surface-hover); border-color: var(--text-muted); }
  .share-btn:active, .share-btn.copied { background: var(--text-main); color: var(--bg); border-color: var(--text-main); }

  /* ТОТАЛЫ */
  .totals-strip {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(70px, 1fr));
    gap: 8px; padding: 16px; background: var(--bg);
  }

  .total-card { 
    background: var(--surface); 
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px; 
    display: flex; flex-direction: column; gap: 4px;
    transition: transform 0.2s ease;
  }
  .total-card:hover { border-color: #3f3f46; }
  
  .total-label { font-size: 10px; color: var(--text-muted); font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em; }
  .total-value { font-family: 'JetBrains Mono', monospace; font-size: 15px; font-weight: 600; color: var(--text-main); }
  
  .total-value.roi-pos { color: var(--positive); }
  .total-value.roi-neg { color: var(--negative); }

  /* ВКЛАДКИ */
  .tabs {
    display: flex; padding: 0 16px;
    border-bottom: 1px solid var(--border);
    gap: 16px;
  }

  .tab {
    padding: 12px 0; font-size: 12px; font-weight: 500; color: var(--text-muted);
    cursor: pointer; transition: all 0.2s ease;
    border-bottom: 2px solid transparent; user-select: none;
    display: flex; align-items: center; gap: 6px;
  }

  .tab.active { color: var(--text-main); border-bottom-color: var(--text-main); }
  .tab:hover:not(.active) { color: #d4d4d8; }

  /* ФИЛЬТР */
  .filter-bar {
    padding: 12px 16px; background: var(--bg);
    display: flex; align-items: center; gap: 12px;
  }

  .filter-input {
    flex: 1; background: var(--surface); border: 1px solid var(--border);
    color: var(--text-main); font-family: 'Inter', sans-serif;
    font-size: 12px; padding: 8px 12px; border-radius: 6px;
    outline: none; transition: all 0.2s ease;
  }

  .filter-input:focus { border-color: #52525b; background: #18181b; }
  .filter-input::placeholder { color: var(--text-muted); }

  .filter-clear {
    background: none; border: none; color: var(--text-muted);
    font-size: 16px; cursor: pointer; padding: 0 4px; display: none;
    transition: color 0.2s ease;
  }
  .filter-clear:hover { color: var(--text-main); }
  .filter-count { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-muted); white-space: nowrap; }

  /* ТАБЛИЦА */
  .table-wrapper { overflow-x: auto; -webkit-overflow-scrolling: touch; position: relative; padding-bottom: 20px;}
  table { width: 100%; border-collapse: collapse; min-width: 680px; text-align: right; }
  
  thead { position: relative; z-index: 2; }
  thead th {
    background: var(--bg); color: var(--text-muted);
    font-size: 10px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em;
    padding: 12px 10px; border-bottom: 1px solid var(--border);
    white-space: nowrap; cursor: pointer; user-select: none; transition: color 0.2s ease;
  }
  thead th:hover { color: var(--text-main); }

  thead th:first-child, tbody td:first-child { position: -webkit-sticky; position: sticky; left: 0; z-index: 3; }
  thead th:first-child { text-align: left; background: var(--bg); min-width: 140px; z-index: 4; }

  tbody tr { border-bottom: 1px solid var(--border); transition: background 0.2s ease; animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) both; }
  
  tbody tr.positive { background: var(--row-positive); }
  tbody tr.negative { background: var(--row-negative); }
  
  tbody tr:hover { background: var(--surface); }
  tbody tr.positive:hover { background: var(--row-positive-hover); }
  tbody tr.negative:hover { background: var(--row-negative-hover); }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

  td { 
    padding: 12px 10px; font-family: 'JetBrains Mono', monospace; 
    font-size: 11px; white-space: nowrap; color: var(--text-main); 
  }

  tbody td:first-child {
    font-family: 'Inter', sans-serif; text-align: left; font-size: 11px; font-weight: 500;
    max-width: 160px; overflow: hidden; text-overflow: ellipsis;
    border-right: 1px solid var(--border); background: var(--bg); color: #d4d4d8;
  }

  /* Исправление sticky колонки для hover-эффектов */
  tbody tr.positive td:first-child { background: #0c1512; } /* Смесь bg и row-positive */
  tbody tr.negative td:first-child { background: #160d10; } /* Смесь bg и row-negative */
  tbody tr:hover td:first-child { background: var(--surface); }
  tbody tr.positive:hover td:first-child { background: #101c18; }
  tbody tr.negative:hover td:first-child { background: #1e1115; }

  /* Типографика данных */
  .roi-pos, .camp-roi-pos { color: var(--positive); font-weight: 600; }
  .roi-neg, .camp-roi-neg { color: var(--negative); font-weight: 600; }
  .spend-val { color: var(--text-main); font-weight: 500; }
  .dep-val { color: var(--brand); font-weight: 500; }
  .rev-val { color: var(--text-main); font-weight: 500; }

  th.sorted { color: var(--text-main); font-weight: 600;}
  th.sorted::after { content: ' ↓'; opacity: 0.6; }
  th.sorted.asc::after { content: ' ↑'; opacity: 0.6; }

  /* КАМПАНИИ */
  .campaigns-container { padding-bottom: 20px; }
  .account-group { margin-bottom: 16px; }

  .account-header {
    background: var(--surface);
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    padding: 10px 16px;
    font-size: 11px; font-weight: 600; text-transform: uppercase;
    color: var(--text-main); letter-spacing: 0.05em;
    display: flex; justify-content: space-between; align-items: center;
  }

  .account-totals { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-muted); font-weight: 400; text-transform: none; letter-spacing: 0;}

  .camp-table thead th { background: var(--bg); border-bottom: 1px solid var(--border); }
  .camp-table td { border-left: none; }
  .camp-table tbody tr:nth-child(even) { background: rgba(255,255,255,0.01); }
  .camp-table tbody tr:hover { background: var(--surface); }

  /* СТАТУСЫ */
  .loading { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 80px 20px; gap: 16px; }
  .spinner { width: 24px; height: 24px; border: 2px solid var(--border); border-top-color: var(--text-main); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  
  .loading-text { color: var(--text-muted); font-size: 10px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; }
  
  .error-box { margin: 20px 16px; padding: 16px; border: 1px solid rgba(239, 68, 68, 0.2); border-radius: 8px; background: rgba(239, 68, 68, 0.05); color: var(--negative); font-size: 12px; }
  .empty { padding: 60px 20px; text-align: center; color: var(--text-muted); font-size: 12px; font-weight: 500;}
  .hidden { display: none !important; }

  /* СКРОЛЛБАР */
  ::-webkit-scrollbar { height: 6px; width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: #52525b; }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <div class="topbar-title">Stats <span class="live-badge">Live</span></div>
    <div class="topbar-date" id="dateRange">загрузка...</div>
  </div>
  <div class="topbar-right">
    <div class="updated-time" id="updatedTime"></div>
    <button class="share-btn" id="shareBtn" onclick="shareLink()">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"></circle><circle cx="6" cy="12" r="3"></circle><circle cx="18" cy="19" r="3"></circle><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line></svg>
      Поделиться
    </button>
  </div>
</div>

<div id="totalsStrip" class="totals-strip" style="display:none">
  <div class="total-card"><div class="total-label">Spend</div><div class="total-value" id="t-spend">—</div></div>
  <div class="total-card"><div class="total-label">Leads</div><div class="total-value" id="t-lids">—</div></div>
  <div class="total-card"><div class="total-label">Dep</div><div class="total-value" id="t-dep">—</div></div>
  <div class="total-card"><div class="total-label">Rev</div><div class="total-value rev" id="t-rev">—</div></div>
  <div class="total-card"><div class="total-label">ROI</div><div class="total-value" id="t-roi">—</div></div>
</div>

<div class="tabs">
  <div class="tab active" id="tab-creatives" onclick="switchTab('creatives')">Креативы</div>
  <div class="tab" id="tab-campaigns" onclick="switchTab('campaigns')">Кампании</div>
</div>

<div class="filter-bar" id="filterBar">
  <input class="filter-input" id="filterInput" type="text"
    placeholder="Поиск по креативам..."
    oninput="onFilter(this.value)"
    autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
  <button class="filter-clear" id="filterClear" onclick="clearFilter()">✕</button>
  <span class="filter-count" id="filterCount"></span>
</div>

<div id="creativesView"></div>
<div id="campaignsView" class="hidden"></div>

<script>
// --- JS остался без изменений ---
const BASE = 'https://krisaze1.github.io/anfxcvietpqetsdghrwiutivjxdglqiwthidygzskqprotuvnzbdg/';
let allCreatives = [];
let allCampaigns = {};
let sortCol = 'Spend';
let sortAsc = false;
let filterText = '';
let activeTab = 'creatives';

function getFilename() {
  const params = new URLSearchParams(window.location.search);
  return params.get('f') || 'data.json';
}

async function loadData() {
  document.getElementById('creativesView').innerHTML =
    `<div class="loading"><div class="spinner"></div><div class="loading-text">Загрузка данных</div></div>`;
  document.getElementById('totalsStrip').style.display = 'none';

  try {
    const filename = getFilename();
    const res = await fetch(BASE + filename, { cache: 'no-store' });
    if (!res.ok) throw new Error(filename + ' not found (' + res.status + ')');
    const json = await res.json();

    allCreatives = json.creatives || json.data || [];
    allCampaigns = json.campaigns || {};
    const meta = json.meta || {};

    const from = meta.date_from || '';
    const to = meta.date_to || '';
    document.getElementById('dateRange').textContent = from === to ? from : `${from} → ${to}`;
    document.getElementById('updatedTime').textContent = meta.updated_at ? meta.updated_at.slice(11, 16) : '';

    renderTotals(json.totals || {});
    renderCreatives();
    renderCampaigns();

  } catch(e) {
    document.getElementById('creativesView').innerHTML =
      `<div class="error-box">Ошибка загрузки<br><br><span style="color:var(--text-muted)">${e.message}</span></div>`;
  }
}

function switchTab(tab) {
  activeTab = tab;
  document.getElementById('tab-creatives').classList.toggle('active', tab === 'creatives');
  document.getElementById('tab-campaigns').classList.toggle('active', tab === 'campaigns');
  document.getElementById('creativesView').classList.toggle('hidden', tab !== 'creatives');
  document.getElementById('campaignsView').classList.toggle('hidden', tab !== 'campaigns');
  document.getElementById('filterBar').classList.toggle('hidden', tab !== 'creatives');
}

function renderTotals(t) {
  if (!t || (!t.Spend && !t.Revenue)) return;
  document.getElementById('totalsStrip').style.display = 'grid';
  document.getElementById('t-spend').textContent = fmt(t.Spend) || '—';
  document.getElementById('t-lids').textContent = t.Lids || '—';
  document.getElementById('t-dep').textContent = t.Dep || '—';
  document.getElementById('t-rev').textContent = fmt(t.Revenue) || '—';
  const roiEl = document.getElementById('t-roi');
  const roi = parseFloat(t.ROI) || 0;
  roiEl.textContent = t.ROI || '—';
  roiEl.className = 'total-value ' + (roi >= 0 ? 'roi-pos' : 'roi-neg');
}

function fmt(n) {
  if (n === undefined || n === null) return '—';
  return Number(n).toLocaleString('ru-RU');
}

function onFilter(val) {
  filterText = val.toLowerCase().trim();
  document.getElementById('filterClear').style.display = filterText ? 'block' : 'none';
  renderCreatives();
}

function clearFilter() {
  filterText = '';
  document.getElementById('filterInput').value = '';
  document.getElementById('filterClear').style.display = 'none';
  renderCreatives();
}

function renderCreatives() {
  const view = document.getElementById('creativesView');
  if (!allCreatives || allCreatives.length === 0) {
    view.innerHTML = '<div class="empty">Нет данных</div>';
    return;
  }

  const filtered = filterText
    ? allCreatives.filter(r => r['Creative'].toLowerCase().includes(filterText))
    : allCreatives;

  const countEl = document.getElementById('filterCount');
  countEl.textContent = filterText ? `${filtered.length} / ${allCreatives.length}` : `${allCreatives.length}`;

  if (filtered.length === 0) {
    view.innerHTML = '<div class="empty">Ничего не найдено</div>';
    return;
  }

  const sorted = [...filtered].sort((a, b) => {
    let av = a[sortCol], bv = b[sortCol];
    av = isNaN(av) ? String(av) : Number(av);
    bv = isNaN(bv) ? String(bv) : Number(bv);
    if (av < bv) return sortAsc ? -1 : 1;
    if (av > bv) return sortAsc ? 1 : -1;
    return 0;
  });

  const cols = [
    { key: 'Creative', label: 'Creative' },
    { key: 'Spend',    label: 'Spend' },
    { key: 'Clicks',   label: 'Clk' },
    { key: 'Avg CPC',  label: 'CPC' },
    { key: 'Lids',     label: 'Lid' },
    { key: 'CPL',      label: 'CPL' },
    { key: 'Reg',      label: 'Reg' },
    { key: 'Dep',      label: 'Dep' },
    { key: 'Revenue',  label: 'Rev' },
    { key: 'ROI',      label: 'ROI' },
  ];

  let html = `<div class="table-wrapper"><table><thead><tr>`;
  cols.forEach(c => {
    const isSorted = sortCol === c.key;
    const cls = isSorted ? (sortAsc ? 'sorted asc' : 'sorted') : '';
    html += `<th class="${cls}" onclick="setSort('${c.key}')">${c.label}</th>`;
  });
  html += `</tr></thead><tbody>`;

  sorted.forEach((row, i) => {
    const roi = parseFloat(row['ROI']) || 0;
    const roiCls = roi >= 0 ? 'roi-pos' : 'roi-neg';
    const rowCls = row['Spend'] > 0 ? (roi >= 0 ? 'positive' : 'negative') : '';

    let creativeName = row['Creative'];
    if (filterText) {
      const idx = creativeName.toLowerCase().indexOf(filterText);
      if (idx !== -1) {
        creativeName =
          creativeName.slice(0, idx) +
          `<mark style="background:rgba(255,255,255,0.15);color:var(--text-main);border-radius:2px;padding:0 2px;">` +
          creativeName.slice(idx, idx + filterText.length) +
          `</mark>` +
          creativeName.slice(idx + filterText.length);
      }
    }

    html += `<tr class="${rowCls}" style="animation-delay:${i * 0.015}s">
      <td title="${row['Creative']}">${creativeName}</td>
      <td class="spend-val">${fmt(row['Spend'])}</td>
      <td>${row['Clicks'] || '—'}</td>
      <td>${row['Avg CPC'] || '—'}</td>
      <td>${row['Lids'] || '—'}</td>
      <td>${row['CPL'] || '—'}</td>
      <td>${row['Reg'] || '—'}</td>
      <td class="dep-val">${row['Dep'] || '—'}</td>
      <td class="rev-val">${fmt(row['Revenue'])}</td>
      <td class="${roiCls}">${row['ROI'] || '—'}</td>
    </tr>`;
  });

  html += `</tbody></table></div>`;
  view.innerHTML = html;
}

function setSort(col) {
  if (sortCol === col) sortAsc = !sortAsc;
  else { sortCol = col; sortAsc = false; }
  renderCreatives();
}

function renderCampaigns() {
  const view = document.getElementById('campaignsView');

  if (!allCampaigns || Object.keys(allCampaigns).length === 0) {
    view.innerHTML = '<div class="empty">Нет данных по кампаниям</div>';
    return;
  }

  let html = '<div class="campaigns-container">';

  for (const [accountName, camps] of Object.entries(allCampaigns)) {
    if (!camps || camps.length === 0) continue;

    const accSpend = camps.reduce((s, c) => s + c.spend, 0);
    const accDep = camps.reduce((s, c) => s + c.dep, 0);
    const accLeads = camps.reduce((s, c) => s + c.leads, 0);

    html += `<div class="account-group">
      <div class="account-header">
        <span>${accountName}</span>
        <span class="account-totals">Spend: ${fmt(accSpend)} | Leads: ${accLeads} | Dep: ${accDep}</span>
      </div>
      <div class="camp-table-wrapper">
        <table class="camp-table">
          <thead><tr>
            <th>Campaign</th>
            <th>Budget</th>
            <th>Spend</th>
            <th>Leads</th>
            <th>CPL</th>
            <th>Dep</th>
            <th>CPD</th>
            <th>ROI</th>
          </tr></thead>
          <tbody>`;

    camps.forEach(c => {
      const cpl = c.leads > 0 ? (c.spend / c.leads).toFixed(2) : '—';
      const cpd = c.dep > 0 ? (c.spend / c.dep).toFixed(2) : '—';
      const revenue = c.revenue || 0;
      const roi = c.spend > 0 && revenue > 0 ? (((revenue - c.spend) / c.spend) * 100).toFixed(1) : null;
      const roiCls = roi !== null ? (parseFloat(roi) >= 0 ? 'camp-roi-pos' : 'camp-roi-neg') : '';
      const roiText = roi !== null ? roi + '%' : '—';
      html += `<tr>
        <td title="${c.name}">${c.name}</td>
        <td>${c.budget || '—'}</td>
        <td class="spend-val">${fmt(c.spend)}</td>
        <td>${c.leads || '—'}</td>
        <td style="color:var(--text-muted)">${cpl}</td>
        <td class="dep-val">${c.dep || '—'}</td>
        <td style="color:var(--text-muted)">${cpd}</td>
        <td class="${roiCls}">${roiText}</td>
      </tr>`;
    });

    html += `</tbody></table></div></div>`;
  }

  html += '</div>';
  view.innerHTML = html;
}

function shareLink() {
  const btn = document.getElementById('shareBtn');
  const url = window.location.href;
  const originalText = btn.innerHTML;
  
  const successState = () => {
    btn.innerHTML = '✓ Скопировано';
    btn.classList.add('copied');
    setTimeout(() => { btn.innerHTML = originalText; btn.classList.remove('copied'); }, 2000);
  };

  if (navigator.share) {
    navigator.share({ title: 'Stats', url }).catch(() => copyToClipboard(url, successState));
    return;
  }
  copyToClipboard(url, successState);
}

function copyToClipboard(text, callback) {
  navigator.clipboard.writeText(text).then(callback).catch(() => {
    const el = document.createElement('textarea');
    el.value = text;
    document.body.appendChild(el);
    el.select();
    document.execCommand('copy');
    document.body.removeChild(el);
    callback();
  });
}

loadData();

if (window.Telegram && window.Telegram.WebApp) {
  window.Telegram.WebApp.ready();
  window.Telegram.WebApp.expand();
}
