<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Stats</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Unbounded:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --border: #1e1e2e;
    --accent: #00ff88;
    --accent2: #ff4466;
    --accent3: #ffaa00;
    --text: #e0e0f0;
    --muted: #555570;
    --positive: #00ff88;
    --negative: #ff4466;
    --header-bg: #0d0d1a;
    --row-positive: rgba(0, 255, 136, 0.06);
    --row-negative: rgba(255, 68, 102, 0.06);
    --row-positive-hover: rgba(0, 255, 136, 0.12);
    --row-negative-hover: rgba(255, 68, 102, 0.12);
    --group-header: #0f0f1f;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    overflow-x: hidden;
    min-height: 100vh;
  }

  /* ТОПБАР */
  .topbar {
    position: sticky; top: 0; z-index: 100;
    background: var(--header-bg);
    border-bottom: 1px solid var(--border);
    padding: 10px 14px;
    display: flex; align-items: center; justify-content: space-between;
    backdrop-filter: blur(10px);
  }

  .topbar-left { display: flex; flex-direction: column; gap: 2px; }

  .topbar-title {
    font-family: 'Unbounded', sans-serif;
    font-size: 13px; font-weight: 700;
    color: var(--accent); letter-spacing: 0.05em;
    display: flex; align-items: center; gap: 6px;
  }

  .topbar-date { font-size: 10px; color: var(--muted); }

  .live-badge {
    display: inline-block; background: var(--accent); color: var(--bg);
    font-size: 8px; padding: 2px 5px; border-radius: 3px; font-weight: 700;
    animation: pulse 1.5s ease-in-out infinite;
  }

  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

  .topbar-right { display: flex; align-items: center; gap: 8px; }
  .updated-time { font-size: 9px; color: var(--muted); }

  .share-btn {
    background: none; border: 1px solid var(--muted); color: var(--muted);
    padding: 4px 8px; border-radius: 4px;
    font-family: 'JetBrains Mono', monospace; font-size: 9px;
    cursor: pointer; transition: all 0.2s; white-space: nowrap;
  }
  .share-btn:active, .share-btn:hover, .share-btn.copied { border-color: var(--accent); color: var(--accent); }

  /* ТОТАЛЫ */
  .totals-strip {
    display: grid; grid-template-columns: repeat(5, 1fr);
    gap: 1px; background: var(--border); border-bottom: 2px solid var(--accent);
  }

  .total-card { background: var(--surface); padding: 8px 6px; text-align: center; }
  .total-label { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 3px; }
  .total-value { font-size: 13px; font-weight: 700; color: var(--accent); }
  .total-value.rev { color: var(--accent3); }
  .total-value.roi-pos { color: var(--positive); }
  .total-value.roi-neg { color: var(--negative); }

  /* ВКЛАДКИ */
  .tabs {
    display: flex; background: var(--surface);
    border-bottom: 1px solid var(--border);
  }

  .tab {
    flex: 1; padding: 10px 0; text-align: center;
    font-size: 11px; color: var(--muted);
    cursor: pointer; transition: all 0.2s;
    border-bottom: 2px solid transparent;
    user-select: none;
  }

  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab:hover { color: var(--text); }

  /* ФИЛЬТР */
  .filter-bar {
    padding: 8px 14px; background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 8px;
  }

  .filter-input {
    flex: 1; background: var(--bg); border: 1px solid var(--border);
    color: var(--text); font-family: 'JetBrains Mono', monospace;
    font-size: 11px; padding: 6px 10px; border-radius: 4px;
    outline: none; transition: border-color 0.2s;
  }

  .filter-input:focus { border-color: var(--accent); }
  .filter-input::placeholder { color: var(--muted); }

  .filter-clear {
    background: none; border: none; color: var(--muted);
    font-size: 14px; cursor: pointer; padding: 0 4px; display: none;
  }

  .filter-count { font-size: 9px; color: var(--muted); white-space: nowrap; }

  /* ТАБЛИЦА КРЕАТИВОВ */
  .table-wrapper {
    overflow-x: auto; -webkit-overflow-scrolling: touch; position: relative;
  }

  table { width: 100%; border-collapse: collapse; min-width: 620px; isolation: isolate; }
  thead { position: relative; z-index: 2; }

  thead th {
    background: var(--header-bg); color: var(--muted);
    font-size: 9px; text-transform: uppercase; letter-spacing: 0.08em;
    padding: 8px; text-align: right;
    border-bottom: 1px solid var(--border);
    white-space: nowrap; cursor: pointer; user-select: none;
  }

  thead th:hover { color: var(--text); }

  thead th:first-child, tbody td:first-child {
    position: -webkit-sticky; position: sticky; left: 0; z-index: 3;
  }

  thead th:first-child {
    text-align: left; background: var(--header-bg);
    min-width: 110px; max-width: 140px; z-index: 4;
  }

  tbody tr { border-bottom: 1px solid var(--border); transition: background 0.15s; animation: fadeIn 0.3s ease both; }
  tbody tr.positive { background: var(--row-positive); }
  tbody tr.negative { background: var(--row-negative); }
  tbody tr.positive:hover, tbody tr.positive:active { background: var(--row-positive-hover); }
  tbody tr.negative:hover, tbody tr.negative:active { background: var(--row-negative-hover); }
  tbody tr:not(.positive):not(.negative):hover,
  tbody tr:not(.positive):not(.negative):active { background: #111120; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

  td { padding: 9px 8px; text-align: right; font-size: 11px; white-space: nowrap; color: var(--text); }

  tbody td:first-child {
    text-align: left; font-size: 10px; color: #aaaacc;
    max-width: 140px; overflow: hidden; text-overflow: ellipsis;
    border-right: 1px solid var(--border); background: var(--bg);
  }

  @supports not (background: color-mix(in srgb, red 50%, blue)) {
    tbody tr.positive td:first-child { background: rgba(0, 255, 136, 0.06); }
    tbody tr.negative td:first-child { background: rgba(255, 68, 102, 0.06); }
    tbody tr:not(.positive):not(.negative) td:first-child { background: var(--bg); }
    tbody tr.positive:hover td:first-child { background: rgba(0, 255, 136, 0.12); }
    tbody tr.negative:hover td:first-child { background: rgba(255, 68, 102, 0.12); }
  }

  .roi-pos { color: var(--positive); font-weight: 600; }
  .roi-neg { color: var(--negative); font-weight: 600; }
  .spend-val { color: #ffffff; font-weight: 600; }
  .dep-val { color: var(--accent3); font-weight: 600; }
  .rev-val { color: var(--accent3); }

  th.sorted { color: var(--accent); }
  th.sorted::after { content: ' ↓'; }
  th.sorted.asc::after { content: ' ↑'; }

  /* ТАБЛИЦА КАМПАНИЙ */
  .campaigns-container { overflow-x: hidden; }

  .account-group { margin-bottom: 4px; }

  .account-header {
    background: var(--group-header);
    border-top: 1px solid var(--accent);
    border-bottom: 1px solid var(--border);
    padding: 8px 14px;
    font-family: 'Unbounded', sans-serif;
    font-size: 10px; font-weight: 700;
    color: var(--accent); letter-spacing: 0.05em;
    display: flex; justify-content: space-between; align-items: center;
  }

  .account-totals { font-size: 9px; color: var(--muted); font-family: 'JetBrains Mono', monospace; font-weight: 400; }

  .camp-table-wrapper { overflow-x: auto; -webkit-overflow-scrolling: touch; }

  .camp-table { width: 100%; border-collapse: collapse; min-width: 500px; }

  .camp-table thead th {
    background: var(--surface); color: var(--muted);
    font-size: 9px; text-transform: uppercase; letter-spacing: 0.06em;
    padding: 6px 8px; text-align: right;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }

  .camp-table thead th:first-child { text-align: left; min-width: 180px; }

  .camp-table tbody tr { border-bottom: 1px solid var(--border); }
  .camp-table tbody tr:hover, .camp-table tbody tr:active { background: #111120; }

  .camp-table td { padding: 8px 8px; text-align: right; font-size: 10px; white-space: nowrap; color: var(--text); }

  .camp-table td:first-child {
    text-align: left; color: #aaaacc; font-size: 10px;
    min-width: 180px;
    /* Полное название — горизонтальный скролл */
    white-space: nowrap;
  }

  /* ОБЩЕЕ */
  .loading {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; padding: 60px 20px; gap: 16px;
  }

  .spinner {
    width: 32px; height: 32px;
    border: 2px solid var(--border); border-top-color: var(--accent);
    border-radius: 50%; animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { color: var(--muted); font-size: 11px; letter-spacing: 0.1em; }

  .error-box {
    margin: 20px 14px; padding: 14px;
    border: 1px solid var(--accent2); border-radius: 6px;
    background: #1a0a0e; color: var(--accent2); font-size: 11px; line-height: 1.6;
  }

  .empty { padding: 40px; text-align: center; color: var(--muted); font-size: 11px; }

  .hidden { display: none !important; }

  ::-webkit-scrollbar { height: 3px; width: 3px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <div class="topbar-title">📊 STATS <span class="live-badge">LIVE</span></div>
    <div class="topbar-date" id="dateRange">загрузка...</div>
  </div>
  <div class="topbar-right">
    <div class="updated-time" id="updatedTime"></div>
    <button class="share-btn" id="shareBtn" onclick="shareLink()">🔗 поделиться</button>
  </div>
</div>

<div id="totalsStrip" class="totals-strip" style="display:none">
  <div class="total-card"><div class="total-label">Spend</div><div class="total-value" id="t-spend">—</div></div>
  <div class="total-card"><div class="total-label">Lids</div><div class="total-value" id="t-lids">—</div></div>
  <div class="total-card"><div class="total-label">Dep</div><div class="total-value" id="t-dep">—</div></div>
  <div class="total-card"><div class="total-label">Rev</div><div class="total-value rev" id="t-rev">—</div></div>
  <div class="total-card"><div class="total-label">ROI</div><div class="total-value" id="t-roi">—</div></div>
</div>

<!-- ВКЛАДКИ -->
<div class="tabs">
  <div class="tab active" id="tab-creatives" onclick="switchTab('creatives')">🎨 Креативы</div>
  <div class="tab" id="tab-campaigns" onclick="switchTab('campaigns')">📋 Кампании</div>
</div>

<!-- ФИЛЬТР (только для креативов) -->
<div class="filter-bar" id="filterBar">
  <input class="filter-input" id="filterInput" type="text"
    placeholder="🔍 фильтр: it, bg, fr..."
    oninput="onFilter(this.value)"
    autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
  <button class="filter-clear" id="filterClear" onclick="clearFilter()">✕</button>
  <span class="filter-count" id="filterCount"></span>
</div>

<!-- КОНТЕНТ -->
<div id="creativesView"></div>
<div id="campaignsView" class="hidden"></div>

<script>
const BASE = 'https://krisaze1.github.io/anfxcvietpqetsdghrwiutivjxdglqiwthidygzskqprotuvnzbdg/';
let allCreatives = [];
let allCampaigns = {};
let sortCol = 'Spend';
let sortAsc = false;
let filterText = '';
let activeTab = 'creatives';

function getFilename() {
  const params = new URLSearchParams(window.location.search);
  return params.get('f') || 'data.json';
}

async function loadData() {
  document.getElementById('creativesView').innerHTML =
    `<div class="loading"><div class="spinner"></div><div class="loading-text">ЗАГРУЗКА...</div></div>`;
  document.getElementById('totalsStrip').style.display = 'none';

  try {
    const filename = getFilename();
    const res = await fetch(BASE + filename, { cache: 'no-store' });
    if (!res.ok) throw new Error(filename + ' not found (' + res.status + ')');
    const json = await res.json();

    allCreatives = json.creatives || json.data || [];
    allCampaigns = json.campaigns || {};
    const meta = json.meta || {};

    const from = meta.date_from || '';
    const to = meta.date_to || '';
    document.getElementById('dateRange').textContent = from === to ? from : `${from} → ${to}`;
    document.getElementById('updatedTime').textContent = meta.updated_at ? meta.updated_at.slice(11, 16) : '';

    renderTotals(json.totals || {});
    renderCreatives();
    renderCampaigns();

  } catch(e) {
    document.getElementById('creativesView').innerHTML =
      `<div class="error-box">⚠ Ошибка загрузки<br><br><span style="color:var(--muted)">${e.message}</span></div>`;
  }
}

function switchTab(tab) {
  activeTab = tab;
  document.getElementById('tab-creatives').classList.toggle('active', tab === 'creatives');
  document.getElementById('tab-campaigns').classList.toggle('active', tab === 'campaigns');
  document.getElementById('creativesView').classList.toggle('hidden', tab !== 'creatives');
  document.getElementById('campaignsView').classList.toggle('hidden', tab !== 'campaigns');
  document.getElementById('filterBar').classList.toggle('hidden', tab !== 'creatives');
}

function renderTotals(t) {
  if (!t || (!t.Spend && !t.Revenue)) return;
  document.getElementById('totalsStrip').style.display = 'grid';
  document.getElementById('t-spend').textContent = fmt(t.Spend) || '—';
  document.getElementById('t-lids').textContent = t.Lids || '—';
  document.getElementById('t-dep').textContent = t.Dep || '—';
  document.getElementById('t-rev').textContent = fmt(t.Revenue) || '—';
  const roiEl = document.getElementById('t-roi');
  const roi = parseFloat(t.ROI) || 0;
  roiEl.textContent = t.ROI || '—';
  roiEl.className = 'total-value ' + (roi >= 0 ? 'roi-pos' : 'roi-neg');
}

function fmt(n) {
  if (n === undefined || n === null) return '—';
  return Number(n).toLocaleString('ru-RU');
}

function onFilter(val) {
  filterText = val.toLowerCase().trim();
  document.getElementById('filterClear').style.display = filterText ? 'block' : 'none';
  renderCreatives();
}

function clearFilter() {
  filterText = '';
  document.getElementById('filterInput').value = '';
  document.getElementById('filterClear').style.display = 'none';
  renderCreatives();
}

function renderCreatives() {
  const view = document.getElementById('creativesView');
  if (!allCreatives || allCreatives.length === 0) {
    view.innerHTML = '<div class="empty">нет данных</div>';
    return;
  }

  const filtered = filterText
    ? allCreatives.filter(r => r['Creative'].toLowerCase().includes(filterText))
    : allCreatives;

  const countEl = document.getElementById('filterCount');
  countEl.textContent = filterText ? `${filtered.length} / ${allCreatives.length}` : `${allCreatives.length}`;

  if (filtered.length === 0) {
    view.innerHTML = '<div class="empty">ничего не найдено</div>';
    return;
  }

  const sorted = [...filtered].sort((a, b) => {
    let av = a[sortCol], bv = b[sortCol];
    av = isNaN(av) ? String(av) : Number(av);
    bv = isNaN(bv) ? String(bv) : Number(bv);
    if (av < bv) return sortAsc ? -1 : 1;
    if (av > bv) return sortAsc ? 1 : -1;
    return 0;
  });

  const cols = [
    { key: 'Creative', label: 'Creative' },
    { key: 'Spend',    label: 'Spend' },
    { key: 'Clicks',   label: 'Clk' },
    { key: 'Avg CPC',  label: 'CPC' },
    { key: 'Lids',     label: 'Lid' },
    { key: 'CPL',      label: 'CPL' },
    { key: 'Reg',      label: 'Reg' },
    { key: 'Dep',      label: 'Dep' },
    { key: 'Revenue',  label: 'Rev' },
    { key: 'ROI',      label: 'ROI' },
  ];

  let html = `<div class="table-wrapper"><table><thead><tr>`;
  cols.forEach(c => {
    const isSorted = sortCol === c.key;
    const cls = isSorted ? (sortAsc ? 'sorted asc' : 'sorted') : '';
    html += `<th class="${cls}" onclick="setSort('${c.key}')">${c.label}</th>`;
  });
  html += `</tr></thead><tbody>`;

  sorted.forEach((row, i) => {
    const roi = parseFloat(row['ROI']) || 0;
    const roiCls = roi >= 0 ? 'roi-pos' : 'roi-neg';
    const rowCls = row['Spend'] > 0 ? (roi >= 0 ? 'positive' : 'negative') : '';

    let creativeName = row['Creative'];
    if (filterText) {
      const idx = creativeName.toLowerCase().indexOf(filterText);
      if (idx !== -1) {
        creativeName =
          creativeName.slice(0, idx) +
          `<mark style="background:rgba(0,255,136,0.3);color:var(--accent);border-radius:2px">` +
          creativeName.slice(idx, idx + filterText.length) +
          `</mark>` +
          creativeName.slice(idx + filterText.length);
      }
    }

    html += `<tr class="${rowCls}" style="animation-delay:${i * 0.015}s">
      <td title="${row['Creative']}">${creativeName}</td>
      <td class="spend-val">${fmt(row['Spend'])}</td>
      <td>${row['Clicks'] || '—'}</td>
      <td>${row['Avg CPC'] || '—'}</td>
      <td>${row['Lids'] || '—'}</td>
      <td>${row['CPL'] || '—'}</td>
      <td>${row['Reg'] || '—'}</td>
      <td class="dep-val">${row['Dep'] || '—'}</td>
      <td class="rev-val">${fmt(row['Revenue'])}</td>
      <td class="${roiCls}">${row['ROI'] || '—'}</td>
    </tr>`;
  });

  html += `</tbody></table></div>`;
  view.innerHTML = html;
}

function setSort(col) {
  if (sortCol === col) sortAsc = !sortAsc;
  else { sortCol = col; sortAsc = false; }
  renderCreatives();
}

function renderCampaigns() {
  const view = document.getElementById('campaignsView');

  if (!allCampaigns || Object.keys(allCampaigns).length === 0) {
    view.innerHTML = '<div class="empty">нет данных по кампаниям</div>';
    return;
  }

  let html = '<div class="campaigns-container">';

  for (const [accountName, camps] of Object.entries(allCampaigns)) {
    if (!camps || camps.length === 0) continue;

    const accSpend = camps.reduce((s, c) => s + c.spend, 0);
    const accDep = camps.reduce((s, c) => s + c.dep, 0);
    const accLeads = camps.reduce((s, c) => s + c.leads, 0);

    html += `<div class="account-group">
      <div class="account-header">
        <span>${accountName}</span>
        <span class="account-totals">spend: ${fmt(accSpend)} | leads: ${accLeads} | dep: ${accDep}</span>
      </div>
      <div class="camp-table-wrapper">
        <table class="camp-table">
          <thead><tr>
            <th>Campaign</th>
            <th>Budget</th>
            <th>Spend</th>
            <th>Leads</th>
            <th>Dep</th>
            <th>Reg</th>
          </tr></thead>
          <tbody>`;

    camps.forEach(c => {
      html += `<tr>
        <td title="${c.name}">${c.name}</td>
        <td>${c.budget || '—'}</td>
        <td class="spend-val">${fmt(c.spend)}</td>
        <td>${c.leads || '—'}</td>
        <td class="dep-val">${c.dep || '—'}</td>
        <td>${c.reg || '—'}</td>
      </tr>`;
    });

    html += `</tbody></table></div></div>`;
  }

  html += '</div>';
  view.innerHTML = html;
}

function shareLink() {
  const btn = document.getElementById('shareBtn');
  const url = window.location.href;
  if (navigator.share) {
    navigator.share({ title: '📊 Stats', url });
    return;
  }
  navigator.clipboard.writeText(url).then(() => {
    btn.textContent = '✅ скопировано';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '🔗 поделиться'; btn.classList.remove('copied'); }, 2000);
  }).catch(() => {
    const el = document.createElement('textarea');
    el.value = url;
    document.body.appendChild(el);
    el.select();
    document.execCommand('copy');
    document.body.removeChild(el);
    btn.textContent = '✅ скопировано';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '🔗 поделиться'; btn.classList.remove('copied'); }, 2000);
  });
}

loadData();

if (window.Telegram && window.Telegram.WebApp) {
  window.Telegram.WebApp.ready();
  window.Telegram.WebApp.expand();
}
</script>
</body>
</html>
